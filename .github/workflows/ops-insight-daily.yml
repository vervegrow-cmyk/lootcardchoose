name: Daily Ops Insight

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  ops-insight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway CLI
        run: railway --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare Railway context
        run: |
          railway --version
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN present: yes"
          else
            echo "RAILWAY_TOKEN present: no"
          fi
          if [ -n "$RAILWAY_PROJECT_ID" ]; then
            echo "RAILWAY_PROJECT_ID present: yes"
            echo "Skipping service-level link; service selector will be used by ops:daily."
            railway link --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_LOG_ENVIRONMENT" || true
          else
            echo "RAILWAY_PROJECT_ID present: no"
          fi
          if [ -n "$RAILWAY_LOG_SERVICE" ]; then
            echo "RAILWAY_LOG_SERVICE configured: yes"
          else
            echo "RAILWAY_LOG_SERVICE configured: no"
          fi
          if [ -n "$RAILWAY_LOG_ENVIRONMENT" ]; then
            echo "RAILWAY_LOG_ENVIRONMENT configured: yes"
          else
            echo "RAILWAY_LOG_ENVIRONMENT configured: no"
          fi
          ls -la .railway || true
          railway status || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_LOG_SERVICE: ${{ vars.RAILWAY_LOG_SERVICE }}
          RAILWAY_LOG_ENVIRONMENT: ${{ vars.RAILWAY_LOG_ENVIRONMENT }}

      - name: Generate Ops Insight Report
        run: npm run ops:daily
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_LOG_SERVICE: ${{ vars.RAILWAY_LOG_SERVICE }}
          RAILWAY_LOG_ENVIRONMENT: ${{ vars.RAILWAY_LOG_ENVIRONMENT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          RAILWAY_LOG_SINCE: 24h
          RAILWAY_LOG_LINES: 1000
          RAILWAY_LOG_TIMEOUT_MS: 30000

      - name: Upload Ops Insight Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-insight-report-${{ github.run_id }}
          path: reports/ops-insights/*.md
          if-no-files-found: error
